  /api/routes:
    post:
      tags: [Routes]
      summary: Сохранить маршрут
      description: |
        Сохраняет маршрут и его POI-точки. После сохранения backend создаёт события route_saved
        по точкам маршрута, поэтому сохранение маршрута влияет на веса категорий и дальнейшие рекомендации.
        Сейчас сохраняются точки маршрута, но не сохраняется отдельная геометрия линии маршрута.
      operationId: createRoute
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRouteRequest'
      responses:
        '201':
          description: Маршрут сохранён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRouteResponse'
        '400':
          description: Некорректный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Требуется авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
