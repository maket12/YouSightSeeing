  /api/events:
    post:
      tags: [Events]
      summary: Записать событие пользователя
      description: |
        Создаёт событие пользователя. Если у события передана категория, backend обновляет вес этой категории.
        События route_saved также создаются автоматически при сохранении маршрута.
      operationId: trackUserEvent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackUserEventRequest'
            examples:
              place_viewed:
                value:
                  event_type: place_viewed
                  place_id: "saved-museum-1"
                  category: entertainment.museum
      responses:
        '200':
          description: Событие создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackUserEventResponse'
        '400':
