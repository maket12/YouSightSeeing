  /api/routes/generate:
    post:
      tags: [Routes]
      summary: Сгенерировать рекомендованный маршрут
      description: |
        Подбирает POI рядом со стартовой точкой, учитывает предпочтения пользователя,
        историю событий, штрафы за повтор place_id, ограничение по времени и разнообразие категорий.
        В ответе возвращаются выбранные места и рассчитанная линия маршрута.
      operationId: generateRoute
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRouteRequest'
      responses:
        '200':
          description: Рекомендованный маршрут построен
          content:
