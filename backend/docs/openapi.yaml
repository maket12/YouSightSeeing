      responses:
        '200':
          description: Список маршрутов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRouteListResponse'
        '401':
          description: Требуется авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Ошибка получения списка маршрутов
          content:
            application/json:
              schema:
